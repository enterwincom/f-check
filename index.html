<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시설관리직 적합성 진단 v2.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --accent-hover: #1d4ed8; --bg: #f8fafc; --danger: #dc2626; --excel: #059669; --excel-hover: #047857; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 650px; margin-top: 20px; }
        
        /* 시작 버튼 */
        .btn-start { 
            width: 100%; background: var(--accent); color: white; border: none; margin-top: 20px; 
            font-size: 1.2rem; padding: 20px; cursor: pointer; border-radius: 12px; font-weight: 700;
            transition: background 0.3s, transform 0.1s;
        }
        .btn-start:hover { background: var(--accent-hover); transform: translateY(-2px); }

        /* 엑셀 저장 버튼 수정 */
        .btn-excel {
            width: 100%; background: var(--excel); color: white; border: none; padding: 18px; 
            border-radius: 12px; margin-top: 10px; cursor: pointer; 
            font-weight: 900; font-size: 1.15rem; /* 글씨를 더 크고 진하게 수정 */
            transition: background 0.3s, transform 0.1s;
        }
        .btn-excel:hover { background: var(--excel-hover); transform: translateY(-2px); }

        /* 다시 시작 버튼 */
        .btn-reload {
            width: 100%; background: none; color: #64748b; border: none; margin-top: 15px; 
            text-decoration: underline; cursor: pointer; font-weight: 800; font-size: 1.05rem;
            padding: 10px; transition: color 0.2s;
        }
        .btn-reload:hover { color: var(--primary); }

        .question-box { font-size: 1.35rem; font-weight: 700; margin-bottom: 2rem; line-height: 1.6; word-break: keep-all; min-height: 100px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .options button { padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; font-size: 1.1rem; font-weight: 600; transition: 0.2s; }
        .options button:hover { border-color: var(--accent); background: #f0f7ff; color: var(--accent); }
        
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }
        
        .result-card { background: #f1f5f9; padding: 18px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid var(--accent); }
        .warning-card { border-left-color: var(--danger); background: #fef2f2; }
        .reliability-box { padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; text-align: center; border: 2px solid #e2e8f0; }
        .interview-guide { font-size: 0.9rem; color: #475569; margin-top: 8px; border-top: 1px dashed #cbd5e1; padding-top: 8px; font-style: italic; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h2 style="color:var(--primary); margin-top:0;">시설관리직 직무 적합성 진단</h2>
        <p style="line-height: 1.7; color: #475569;">
            본 검사는 시설관리 업무 수행 시 필요한 <b>안전 의식, 원칙 준수, 위기 대처 능력</b>을 확인합니다<br><br>
            • 문항 수: 총 50문항 (신뢰도 체크 포함)<br>
            • 엑셀 다운로드 시 '종합 결과 요약' 시트가 함께 생성됩니다.
        </p>
        <button class="btn-start" onclick="startTest()">검사 시작하기</button>
    </div>

    <div id="question-screen" class="hidden">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="q-info" style="font-size:0.9rem; color:#64748b; margin-bottom:10px;">문항 1 / 50</div>
        <div class="question-box" id="question-text"></div>
        <div class="options">
            <button onclick="handleAnswer(5)">매우 그렇다</button>
            <button onclick="handleAnswer(4)">그렇다</button>
            <button onclick="handleAnswer(3)">보통이다</button>
            <button onclick="handleAnswer(2)">아니다</button>
            <button onclick="handleAnswer(1)">매우 아니다</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 style="margin-bottom: 10px;">종합 진단 결과</h2>
        <div id="reliability-box" class="reliability-box"></div>
        <div id="result-area"></div>
        <!-- 글씨가 진해진 엑셀 저장 버튼 -->
        <button class="btn-excel" onclick="downloadExcel()">엑셀 데이터 저장 (전체 시트)</button>
        <button class="btn-reload" onclick="location.reload()">다시 시작하기</button>
    </div>
</div>

<script>
    const rawQuestions = [
        // [안전의식] - 10문항[cite: 1]
        { q: "작업 중 안전 보호구 착용이 불편하다면 아주 잠시 벗고 작업할 수도 있다.", cat: "안전의식", type: "-" },
        { q: "장비 점검 전 전원 차단 확인 절차는 아무리 바빠도 절대 생략하지 않는다.", cat: "안전의식", type: "+" },
        { q: "익숙한 기계라면 매뉴얼을 보지 않고도 안전하게 다룰 자신이 있다.", cat: "안전의식", type: "-" },
        { q: "작업 중 발견한 아주 작은 이상 징후도 즉시 상급자에게 보고한다.", cat: "안전의식", type: "+" },
        { q: "위험 작업 시 2인 1조 수칙보다 빠른 처리가 더 중요할 때가 있다.", cat: "안전의식", type: "-" },
        { q: "사용이 끝난 공구와 자재는 즉시 정해진 위치에 안전하게 정리한다.", cat: "안전의식", type: "+" },
        { q: "안전 장치 오작동 시 임시로 해제하고 계속 작업하는 경우가 있다.", cat: "안전의식", type: "-" },
        { q: "사소한 시설 결함이라도 사고의 전조 증상이라 생각하고 확인한다.", cat: "안전의식", type: "+" },
        { q: "안전 교육은 현장 업무에 비해 형식적이라 큰 도움이 안 된다고 생각한다.", cat: "안전의식", type: "-" },
        { q: "작업 효율보다 작업자의 안전이 모든 상황에서 최우선이다.", cat: "안전의식", type: "+" },

        // [원칙준수/윤리] - 10문항[cite: 1]
        { q: "점검표를 작성할 때 가끔은 기억에 의존해서 일괄 체크하기도 한다.", cat: "원칙준수", type: "-" },
        { q: "회사의 비품이나 남은 자재를 개인적으로 가져가는 것은 절대 안 된다.", cat: "원칙준수", type: "+" },
        { q: "아무도 보지 않는 야간 순찰 시 정해진 경로 중 일부를 생략할 수 있다.", cat: "원칙준수", type: "-" },
        { q: "상급자가 안전 절차 생략을 지시하더라도 나는 원칙을 고수할 것이다.", cat: "원칙준수", type: "+" },
        { q: "업무상 실수를 했을 때 큰 문제가 없다면 굳이 보고하지 않는다.", cat: "원칙준수", type: "-" },
        { q: "교대 근무 시 다음 근무자에게 특이사항을 반드시 문서로 인계한다.", cat: "원칙준수", type: "+" },
        { q: "정해진 매뉴얼은 현장 상황에 따라 적당히 무시해도 된다고 본다.", cat: "원칙준수", type: "-" },
        { q: "법적으로 정해진 정기 점검 주기는 하루라도 어겨서는 안 된다.", cat: "원칙준수", type: "+" },
        { q: "공과 사를 명확히 구별하여 회사 자산을 사적으로 이용하지 않는다.", cat: "원칙준수", type: "+" },
        { q: "바쁜 시간대에는 복잡한 기록 절차를 나중에 한꺼번에 처리하기도 한다.", cat: "원칙준수", type: "-" },

        // [위기대처] - 10문항[cite: 1]
        { q: "갑작스러운 정전 발생 시 당황하기보다 복구 매뉴얼 순서부터 생각한다.", cat: "위기대처", type: "+" },
        { q: "화재 알람이 울리면 오작동 여부 확인 전 대피 유도를 우선한다.", cat: "위기대처", type: "+" },
        { q: "여러 곳에서 민원이 동시다발적으로 발생하면 무엇부터 할지 몰라 헤맨다.", cat: "위기대처", type: "-" },
        { q: "비상 상황 종료 후 반드시 원인 파악 및 재발 방지 보고서를 작성한다.", cat: "위기대처", type: "+" },
        { q: "긴박한 장애 상황일수록 내 판단보다 매뉴얼과 상급자 지시를 따른다.", cat: "위기대처", type: "+" },
        { q: "예상치 못한 기계 고장 시 당황해서 평소 하던 작업도 실수할 때가 있다.", cat: "위기대처", type: "-" },
        { q: "비상 연락망과 소방 시설의 위치를 완벽하게 숙지하고 있다.", cat: "위기대처", type: "+" },
        { q: "업무 압박이 심한 상황에서는 평소보다 성격이 예민해지는 편이다.", cat: "위기대처", type: "-" },
        { q: "장애 복구 시 내 지식으로 해결이 안 되면 즉시 전문가나 외주 업체에 도움을 요청한다.", cat: "위기대처", type: "+" },
        { q: "돌발 상황에서 주변 사람들을 안심시키며 대처하는 편이다.", cat: "위기대처", type: "+" },

        // [책임감/성실성] - 10문항[cite: 1]
        { q: "매일 반복되는 점검 업무를 한 번도 거르지 않고 성실히 수행할 자신이 있다.", cat: "책임감", type: "+" },
        { q: "나의 작은 부주의가 건물 전체의 사고로 이어질 수 있음을 항상 의식한다.", cat: "책임감", type: "+" },
        { q: "업무 시간이 끝났어도 긴급한 보수 사항이 있으면 끝까지 처리하고 퇴근한다.", cat: "책임감", type: "+" },
        { q: "주변 환경이 지저분한 것을 보면 그냥 지나치지 못하고 정리하는 편이다.", cat: "책임감", type: "+" },
        { q: "내 담당 구역이 아니더라도 시설 결함을 발견하면 조치하거나 보고한다.", cat: "책임감", type: "+" },
        { q: "지각이나 결근 없이 출퇴근 시간을 엄수하는 것은 당연한 의무다.", cat: "책임감", type: "+" },
        { q: "새로운 설비의 매뉴얼이 들어오면 자발적으로 공부해서 익힌다.", cat: "책임감", type: "+" },
        { q: "반복적인 단순 작업이 계속되면 집중력이 쉽게 흐트러지는 편이다.", cat: "책임감", type: "-" },
        { q: "점검 중 발견한 노후 부품은 당장 고장이 아니더라도 미리 교체 건의를 한다.", cat: "책임감", type: "+" },
        { q: "어려운 과제가 주어져도 중간에 포기하지 않고 해결책을 찾는다.", cat: "책임감", type: "+" },

        // [신뢰도(L-Score)] - 10문항[cite: 1]
        { q: "나는 태어나서 단 한 번도 거짓말을 한 적이 없다.", cat: "신뢰도", type: "L" },
        { q: "나는 약속을 어긴 적이 평생 단 한 번도 없다.", cat: "신뢰도", type: "L" },
        { q: "나는 모든 사람을 조건 없이 항상 사랑하고 좋아한다.", cat: "신뢰도", type: "L" },
        { q: "나는 가끔 화를 낼 때가 있다.", cat: "신뢰도", type: "L_REV" },
        { q: "나는 한 번도 다른 사람의 물건을 부러워한 적이 없다.", cat: "신뢰도", type: "L" },
        { q: "나는 규칙을 가끔 어길 때가 있다.", cat: "신뢰도", type: "L_REV" },
        { q: "나는 단 한 번도 내 실수를 숨기려고 한 적이 없다.", cat: "신뢰도", type: "L" },
        { q: "나는 모든 일에 항상 만족하며 불만이 전혀 없다.", cat: "신뢰도", type: "L" },
        { q: "나는 살면서 단 한 번도 욕설을 해본 적이 없다.", cat: "신뢰도", type: "L" },
        { q: "나는 때때로 게으름을 피우고 싶을 때가 있다.", cat: "신뢰도", type: "L_REV" }
    ];

    let questions = [];
    let currentIdx = 0;
    let userAnswers = [];
    let summaryData = {};
    let lieResultText = "";

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startTest() {
        questions = shuffle([...rawQuestions]);
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('question-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('q-info').innerText = `문항 ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('progress-fill').style.width = `${(currentIdx / questions.length) * 100}%`;
    }

    function handleAnswer(score) {
        const q = questions[currentIdx];
        let calcScore = score;
        if (q.type === "-") calcScore = 6 - score;
        
        userAnswers.push({ ...q, answer: score, calculated: calcScore });
        currentIdx++;
        
        if (currentIdx < questions.length) {
            showQuestion();
        } else {
            renderResult();
        }
    }

    function renderResult() {
        document.getElementById('question-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        const catRes = {};
        let lScore = 0;

        userAnswers.forEach(a => {
            if (a.cat === "신뢰도") {
                if (a.type === "L" && a.answer >= 4) lScore++;
                if (a.type === "L_REV" && a.answer <= 2) lScore++;
            } else {
                if (!catRes[a.cat]) catRes[a.cat] = { sum: 0, count: 0 };
                catRes[a.cat].sum += a.calculated;
                catRes[a.cat].count++;
            }
        });

        const relBox = document.getElementById('reliability-box');
        if (lScore >= 7) {
            lieResultText = "결과 신뢰 불가 (방어적 응답 강함)";
            relBox.innerText = "❌ " + lieResultText;
            relBox.style.color = "#dc2626";
        } else if (lScore >= 4) {
            lieResultText = "신뢰도 주의 (일부 방어적 응답)";
            relBox.innerText = "⚠️ " + lieResultText;
            relBox.style.color = "#b45309";
        } else {
            lieResultText = "정상 (솔직한 답변)";
            relBox.innerText = "✅ " + lieResultText;
            relBox.style.color = "#166534";
        }

        let resHtml = "";
        summaryData = {};

        Object.keys(catRes).forEach(cat => {
            const avg = (catRes[cat].sum / catRes[cat].count).toFixed(1);
            const width = (avg / 5) * 100;
            let guide = "적합";
            
            if (avg < 3.5) {
                if (cat === "안전의식") guide = "위험 상황 발생 리스크 있음. 안전 규정 준수 이력 확인 요망.";
                if (cat === "원칙준수") guide = "절차 생략 가능성 있음. 정직성에 대한 심층 질문 필요.";
                if (cat === "위기대처") guide = "돌발 상황 당황 리스크. 과거 비상 조치 사례 확인 필요.";
            } else {
                guide = "직무 수행에 적합한 인성 보유.";
            }

            summaryData[cat] = { avg, guide };

            resHtml += `
                <div class="result-card ${avg < 3.5 ? 'warning-card' : ''}">
                    <div style="display:flex; justify-content:space-between; font-weight:bold;">
                        <span>${cat}</span>
                        <span>${avg} / 5.0</span>
                    </div>
                    <div class="bar-container" style="background:#e2e8f0; height:8px; border-radius:10px; margin-top:8px;">
                        <div style="width:${width}%; background:var(--accent); height:100%; border-radius:10px;"></div>
                    </div>
                    <div class="interview-guide">면접 가이드: ${guide}</div>
                </div>
            `;
        });
        document.getElementById('result-area').innerHTML = resHtml;
    }

    function downloadExcel() {
        const summaryRows = [
            ["시설관리직 적합성 진단 종합 보고서"],
            ["진단 일자", new Date().toLocaleString()],
            ["응답 신뢰도", lieResultText],
            [],
            ["역량 항목", "평균 점수(5.0 만점)", "인사팀 종합 의견 및 면접 가이드"]
        ];
        
        Object.keys(summaryData).forEach(cat => {
            summaryRows.push([cat, summaryData[cat].avg, summaryData[cat].guide]);
        });

        const detailRows = [["번호", "역량군", "질문 내용", "응답 점수(1~5)", "환산 점수"]];
        userAnswers.forEach((a, i) => {
            detailRows.push([i + 1, a.cat, a.q, a.answer, a.calculated]);
        });

        const wb = XLSX.utils.book_new();
        const wsSummary = XLSX.utils.aoa_to_sheet(summaryRows);
        const wsDetail = XLSX.utils.aoa_to_sheet(detailRows);

        XLSX.utils.book_append_sheet(wb, wsSummary, "종합 결과 요약");
        XLSX.utils.book_append_sheet(wb, wsDetail, "상세 응답 데이터");

        XLSX.writeFile(wb, `시설관리_진단결과_${new Date().toISOString().slice(0,10)}.xlsx`);
    }
</script>
</body>
</html>
